<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#222;
padding:40px;
border-radius:15px;
text-align:center;
width:350px;
}

h1{
color:lime;
}

input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:8px;
}

button{
padding:12px 25px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="New Username" required><br>

<input type="password" name="password" placeholder="New Password" required><br>

<button type="submit">Sign Up</button>

</form>

</div>

</body>
</html>
