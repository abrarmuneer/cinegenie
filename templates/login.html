<!DOCTYPE html>
<html>
<head>
<title>Movie Verse Login</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000000,#1c1c1c,#3a0000);
background-size:400% 400%;
animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
text-align:center;
width:360px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
color:red;
margin-bottom:8px;
font-size:34px;
}

h3{
color:white;
font-weight:normal;
margin-bottom:20px;
}

input{
width:92%;
padding:13px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:12px;
width:95%;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.login{
background:red;
color:white;
}

.login:hover{
background:darkred;
transform:scale(1.03);
}

.signup{
background:green;
color:white;
}

.signup:hover{
background:darkgreen;
transform:scale(1.03);
}

.eye{
background:#555;
width:auto;
padding:10px 15px;
margin-top:0;
}
</style>
</head>

<body>

<div class="box">

<h1>🎬Movie Verse</h1>
<h3>Created by Abrar</h3>

<form action="/check" method="POST">

<input type="text" name="username" placeholder="Username" required><br>

<input type="password" id="pass" name="password" placeholder="Password" required>

<button type="button" class="eye" onclick="showPass()">👁</button><br>

<button type="submit" class="login">Login</button>

</form>

<form action="/signup">
<button type="submit" class="signup">Sign Up</button>
</form>

</div>

<script>
function showPass(){
var x=document.getElementById("pass");
if(x.type=="password"){
x.type="text";
}else{
x.type="password";
}
}
</script>

</body>
</html>
