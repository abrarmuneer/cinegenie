<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#000;
position:relative;
}

/* Universe Background */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,20,0.55), rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
z-index:-2;
}

/* Glow Effect */
body::after{
content:"";
position:absolute;
top:-20%;
left:-20%;
width:140%;
height:140%;
background:
radial-gradient(circle, rgba(0,140,255,0.18), transparent 40%),
radial-gradient(circle, rgba(255,0,120,0.15), transparent 35%);
animation:spaceGlow 10s linear infinite alternate;
z-index:-1;
}

@keyframes spaceGlow{
0%{transform:translate(0,0);}
100%{transform:translate(60px,40px);}
}

/* Login Box */
.container{
width:430px;
max-width:95%;
padding:35px;
border-radius:20px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,0.08);
color:white;
text-align:center;
}

h1{
color:#ff2b2b;
margin-bottom:10px;
font-size:42px;
}

p{
margin-bottom:25px;
color:#ddd;
}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
background:#e50914;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
background:#ff2433;
}

.signup-btn{
background:#18b600;
}

.signup-btn:hover{
background:#23d100;
}
</style>
