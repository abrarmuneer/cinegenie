<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
width:400px;
padding:35px;
background:#111;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(255,0,0,0.3);
}

h1{
color:red;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Movie Verse Admin</h1>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
