<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
z-index:-1;
}

.box{
width:420px;
max-width:95%;
padding:35px;
border-radius:18px;
background:rgba(20,20,20,0.85);
box-shadow:0 0 25px rgba(255,0,0,0.25);
text-align:center;
}

h1{
font-size:34px;
color:red;
margin-bottom:10px;
}

p{
color:#ccc;
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff1e1e;
}

.error{
color:#ff4d4d;
margin-bottom:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>Movie Verse Admin</h1>
<p>Secure Dashboard Login</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
